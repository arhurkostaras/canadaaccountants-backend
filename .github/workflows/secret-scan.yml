name: secret-scan

on:
  push:
  pull_request:

# The action posts a PR summary comment on pull_request events; the default
# token is read-only there, which made every PR run fail 403 while the push
# run on the same commit passed. Grant the two scopes it writes with.
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gitleaks:
    name: gitleaks full-history scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for proper scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
