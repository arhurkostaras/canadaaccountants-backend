name: secret-scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    name: gitleaks full-history scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for proper scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
