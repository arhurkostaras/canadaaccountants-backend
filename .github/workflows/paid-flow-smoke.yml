name: paid-flow-smoke
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 6 * * *'
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/paid-flow-smoke.mjs
